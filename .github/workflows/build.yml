name: Build OpenWrt packages

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish artifacts to (optional)'
        required: false
        default: ''

jobs:
  build:
    name: ${{ matrix.arch }} @ ${{ matrix.sdk }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        sdk: ['24.10.6', '25.12.4']
        arch:
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - aarch64_cortex-a76
          - aarch64_generic
          - arm_arm1176jzf-s_vfp
          - arm_arm926ej-s
          - arm_cortex-a15_neon-vfpv4
          - arm_cortex-a5_vfpv4
          - arm_cortex-a7
          - arm_cortex-a7_neon-vfpv4
          - arm_cortex-a7_vfpv4
          - arm_cortex-a8_vfpv3
          - arm_cortex-a9
          - arm_cortex-a9_neon
          - arm_cortex-a9_vfpv3-d16
          - arm_fa526
          - arm_xscale
          - i386_pentium-mmx
          - i386_pentium4
          - mips64_octeonplus
          - mips_24kc
          - mips_4kec
          - mips_mips32
          - mipsel_24kc
          - mipsel_24kc_24kf
          - mipsel_74kc
          - mipsel_mips32
          - powerpc_464fp
          - riscv64_riscv64
          - x86_64
        exclude:
          # Не собирается на новом SDK (Qt6/libtorrent несовместимы с этими таргетами в 25.12)
          - { arch: mips_4kec,        sdk: '25.12.4' }
          - { arch: riscv64_riscv64,  sdk: '25.12.4' }

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build packages with OpenWrt SDK
        uses: openwrt/gh-action-sdk@v9
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: qbittorrent
          PACKAGES: luci-app-qbittorrent qbittorrent qt6base qt6tools rblibtorrent
          NO_REFRESH_CHECK: 'true'
          V: sc
          BUILD_LOG: '1'

      - name: Collect built packages
        if: success()
        run: |
          mkdir -p artifacts
          # Берём пакеты только из нашего фида (qbittorrent), без пересобранных deps из base/packages/luci
          find bin/packages/*/qbittorrent -type f \( -name "*.ipk" -o -name "*.apk" \) -exec cp -v {} artifacts/ \; 2>/dev/null || true
          echo "=== Collected ==="
          ls -lh artifacts/

      - name: Verify required packages built
        if: success()
        run: |
          required=(qbittorrent libQt6Core libQt6Network libQt6Sql libQt6Xml rblibtorrent luci-app-qbittorrent)
          missing=()
          for pkg in "${required[@]}"; do
            if ! ls artifacts/${pkg}_* artifacts/${pkg}-* 2>/dev/null | grep -q .; then
              missing+=("$pkg")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required packages: ${missing[*]}"
            echo "Build silently skipped these packages — likely a dep/defconfig issue."
            exit 1
          fi
          echo "All required packages present."

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.arch }}-${{ matrix.sdk }}
          path: artifacts/*
          if-no-files-found: warn
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.arch }}-${{ matrix.sdk }}
          path: |
            logs/
          if-no-files-found: ignore
          retention-days: 7

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    if: |
      !cancelled() &&
      needs.build.result != 'failure' &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '') ||
        github.event_name == 'release'
      )
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: packages-*
          merge-multiple: false

      - name: Repack artifacts per arch
        run: |
          mkdir -p release
          cd artifacts
          for d in packages-*; do
            arch="${d#packages-}"
            (cd "$d" && zip -r "../../release/qbittorrent-${arch}.zip" .)
          done
          ls -lh ../release

      - name: Determine release tag and type
        id: tag
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && -n "${{ github.event.inputs.release_tag }}" ]]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT
            echo "name=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "rolling=false" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "name=$TAG" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "rolling=false" >> $GITHUB_OUTPUT
          else
            SHORT=$(git rev-parse --short "$GITHUB_SHA")
            echo "tag=nightly" >> $GITHUB_OUTPUT
            echo "name=Nightly build ($SHORT)" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "rolling=true" >> $GITHUB_OUTPUT
          fi

      - name: Build release notes
        run: |
          QBT_VER=$(grep -m1 '^PKG_VERSION' qbittorrent/Makefile | cut -d= -f2)
          LIBT_VER=$(grep -m1 '^PKG_VERSION' rblibtorrent/Makefile | cut -d= -f2)
          QT_VER=$(grep -m1 '^PKG_VERSION' qt6base/Makefile | cut -d= -f2)
          SHORT=$(git rev-parse --short "$GITHUB_SHA")

          cat > release_notes.md <<EOF
          ## qBittorrent for OpenWrt

          - **qBittorrent**: $QBT_VER
          - **libtorrent-rasterbar**: $LIBT_VER
          - **Qt6**: $QT_VER
          - **Commit**: \`$SHORT\`

          Сборка под OpenWrt **24.10.6** (формат \`.ipk\`) и **25.12.4** (формат \`.apk\`).

          Скачайте zip под свою архитектуру + версию SDK, распакуйте и закиньте все файлы на роутер (например в \`/tmp/qbt\`).

          ### Какой архив скачать?

          Узнайте архитектуру роутера: \`opkg print-architecture\` (на 24.10) или \`apk info --print-arch\` (на 25.12). Имя файла: \`qbittorrent-<arch>-<sdk-version>.zip\`.

          ### Установка на OpenWrt 24.10 (ipk)

          \`\`\`sh
          opkg update
          cd /tmp/qbt
          opkg install ./*.ipk
          /etc/init.d/qbittorrent enable
          /etc/init.d/qbittorrent start
          \`\`\`

          \`opkg\` сам подтянет boost, openssl и прочие зависимости из официальных репозиториев OpenWrt и поставит наши локальные пакеты в правильном порядке.

          Если опкаджет ругается на отсутствующие зависимости (например \`boost-*\` нет в feed):
          \`\`\`sh
          # Включить feed packages (обычно уже включён)
          sed -i 's/^#src/src/' /etc/opkg/distfeeds.conf
          opkg update
          \`\`\`

          ### Установка на OpenWrt 25.12 (apk)

          \`\`\`sh
          apk update
          cd /tmp/qbt
          apk add --allow-untrusted ./*.apk
          /etc/init.d/qbittorrent enable
          /etc/init.d/qbittorrent start
          \`\`\`

          ### Ручной порядок (если автоматика не справилась)

          1. \`boost-system boost-program_options boost-thread boost-filesystem boost-random libopenssl3\` — из официального репо.
          2. \`libQt6Core\` → \`libQt6Network\` → \`libQt6Sql\` → \`libQt6Xml\` — Qt6 в порядке зависимостей.
          3. \`qt6-plugin-libqopensslbackend\`, \`qt6-plugin-libqsqlite\` — Qt6-плагины.
          4. \`rblibtorrent\` — libtorrent-rasterbar.
          5. \`qbittorrent\` — сам демон (qbittorrent-nox).
          6. \`luci-app-qbittorrent\` — веб-морда в LuCI.

          ### После установки

          - Web UI на \`http://<router-ip>:8080\`
          - Логин: \`admin\`, временный пароль ищите в логах: \`logread | grep -i qbittorrent\`
          - LuCI → Services → qBittorrent для настройки автозапуска и параметров

          ---
          Собрано автоматически через GitHub Actions с использованием [openwrt/gh-action-sdk](https://github.com/openwrt/gh-action-sdk).
          EOF

      - name: Delete previous nightly release
        if: steps.tag.outputs.rolling == 'true'
        run: |
          gh release delete nightly --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" 2>/dev/null || true

      - name: Create release
        run: |
          ARGS=(
            --repo "$GITHUB_REPOSITORY"
            --title "${{ steps.tag.outputs.name }}"
            --notes-file release_notes.md
          )
          if [[ "${{ steps.tag.outputs.prerelease }}" == "true" ]]; then
            ARGS+=(--prerelease)
          fi
          if [[ "${{ steps.tag.outputs.rolling }}" == "true" ]]; then
            ARGS+=(--target "$GITHUB_SHA")
          fi
          gh release create "${{ steps.tag.outputs.tag }}" "${ARGS[@]}" release/*.zip
